<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://1drv.ms/i/c/9f2fe505d93cb2b5/IQQ1viORou1US5BLjYZ34ezJAV_Pg8fkzHc0ybH6iu_7MY4?width=1024">
  <title>Contact Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ContactPage.css" />
</head>
<body>
  <div class="head-flex-box">
    <div class="head-flex">
        <nav id="navbar">
            <ul>
              <li><a class="nav-link" href="https://github.com/EsteBot">GitHub</a></li>
              <li><a class="nav-link" href="ResumePage.html">Resume</a></li>
              <li><a class="nav-link" href="PublicationPage.html">Publications & Presentations</a></li>
              <li><a class="nav-link" href="AccomplishmentsPage.html">Accomplishments</a></li>
              <li><a class="nav-link" href="MyJourneyPage.html">My Journey</a></li>
              <li><a class="nav-link" href="ContactPage.html">Contact</a></li>
            </ul>
        </nav>
    </div>
  </div>
  <main class="content">
    <section class="contact-body">
      <div class="terminal-container">
        <div class="terminal-header">
          <div class="terminal-symbol" aria-hidden="true">
            <span>&gt;_</span>
          </div>
          <div class="terminal-title">contact_protocols.py</div>
        </div>

        <div class="terminal-body">
          <span id="typewriter"></span><span id="cursor" class="cursor">|</span>

          <div id="interactive-prompt" class="hidden">
            <span class="prompt-text">&gt;&gt;&gt; reach_out(impressed=</span>
            <button class="param-btn true-btn" type="button" onclick="runProtocol(true)">True</button>
            <span class="prompt-text">/</span>
            <button class="param-btn false-btn" type="button" onclick="runProtocol(false)">False</button>
            <span class="prompt-text">)</span>

            <div id="function-output"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="bottom-flex-box">
    <div class="return-icon">
      <a href="index.html"><img
            src="https://1drv.ms/i/s!ArWyPNkF5S-foaFRS7NmX5PhB36xhQ?embed=1&width=512&height=512"
            alt="home profile logo"
            loading="eager"
            class="logo-img"
            width="100px">
      </a></div>
  </div>

  <script>
    const codeText = `def reach_out(impressed: bool):
    contact_info = {
        "phone": "(303) 548-0325",
        "email": "estestyle@gmail.com",
        "linkedIn": "https://www.linkedin.com/in/estestyle/"
    }

    if impressed:
        print("Excellent choice. Let's build.")
        return contact_info
    else:
        return "Review more of Esteban's projects!"`;

    let index = 0;
    const speed = 25;

    function appendTypedCharacter(character) {
      const typewriter = document.getElementById("typewriter");

      if (character === "\n") {
        typewriter.appendChild(document.createElement("br"));
      } else {
        typewriter.appendChild(document.createTextNode(character));
      }
    }

    function typeWriter() {
      if (index < codeText.length) {
        appendTypedCharacter(codeText.charAt(index));
        index++;
        setTimeout(typeWriter, speed);
      } else {
        document.getElementById("cursor").style.display = "none";
        document.getElementById("interactive-prompt").classList.remove("hidden");
      }
    }

    function runProtocol(impressed) {
      const outputDiv = document.getElementById("function-output");

      if (impressed) {
        outputDiv.innerHTML = `
          &gt;&gt;&gt; Excellent choice. Let's build.<br>
          &gt;&gt;&gt; {<br>
          &nbsp;&nbsp;&nbsp;&nbsp;"phone": "<a class='terminal-link' href='tel:3035480325'>+1 (303) 548-0325</a>",<br>
          &nbsp;&nbsp;&nbsp;&nbsp;"email": "<a class='terminal-link' href='mailto:estestyle@gmail.com'>estestyle@gmail.com</a>",<br>
          &nbsp;&nbsp;&nbsp;&nbsp;"linkedIn": "<a class='terminal-link' href='https://www.linkedin.com/in/estestyle/' target='_blank' rel='noopener'>linkedin.com/in/estestyle</a>"<br>
          &gt;&gt;&gt; }
        `;
      } else {
        outputDiv.innerHTML = `
          &gt;&gt;&gt; "Review more of Esteban's projects!"<br>
          &gt;&gt;&gt; Error 418: Teapot / Missing enthusiasm. Try clicking 'True'.
        `;
      }
    }

    window.addEventListener("load", typeWriter);
  </script>
</body>
</html>
